<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Huawei Corporate Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* ============ Huawei corporate theme (default: classic red) ============
       Switch theme: copy one :root block from references/themes-huawei.md and
       replace the variables in this section only. */
    --paper:#f7f8fa;
    --paper-rgb:247,248,250;
    --card:#ffffff;
    --ink:#22252b;
    --ink-rgb:34,37,43;
    --muted:#6f7680;
    --line:#dfe3e8;
    --line-strong:#c7ccd4;
    --brand-red:#c7000b;
    --brand-red-rgb:199,0,11;
    --brand-red-dark:#990008;
    --brand-red-soft:#f5e5e7;
    --brand-black:#111111;
    --brand-grey:#f0f2f5;
    --shadow:0 18px 46px rgba(15,23,42,.12);
    --shadow-soft:0 10px 26px rgba(15,23,42,.10);

    --sans:"Inter","Noto Sans SC","Microsoft YaHei UI",Arial,sans-serif;
    --sans-zh:"Noto Sans SC","Microsoft YaHei UI",Arial,sans-serif;
    --mono:"JetBrains Mono","SFMono-Regular",Consolas,monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }
  body.low-power *,body.low-power *::before,body.low-power *::after{
    animation:none!important;
    transition:none!important;
    scroll-behavior:auto!important;
  }

  #deck{
    display:flex;
    width:100vw;
    height:100vh;
    transition:transform .72s cubic-bezier(.22,1,.36,1);
  }
  body.low-power #deck{transition:none!important}

  .slide{
    position:relative;
    flex:0 0 100vw;
    width:100vw;
    height:100vh;
    padding:7.2vh 7vw 7vh;
    overflow:hidden;
    background:
      linear-gradient(180deg,rgba(255,255,255,.94),rgba(247,248,250,.96)),
      radial-gradient(circle at 78% 12%,rgba(var(--brand-red-rgb),.08),transparent 22vw),
      radial-gradient(circle at 12% 88%,rgba(17,17,17,.045),transparent 28vw);
  }
  .slide::before,
  .slide::after{
    content:"";
    position:absolute;
    pointer-events:none;
    border-radius:999px;
    z-index:0;
  }
  .slide::before{
    width:13vw;
    height:13vw;
    right:6vw;
    top:10vh;
    background:linear-gradient(145deg,#fff,rgba(223,227,232,.95));
    box-shadow:inset -12px -12px 22px rgba(255,255,255,.9),inset 10px 10px 26px rgba(111,118,128,.14),0 14px 28px rgba(15,23,42,.08);
    opacity:.32;
  }
  .slide::after{
    width:2.6vw;
    height:2.6vw;
    left:6.3vw;
    bottom:8vh;
    background:var(--brand-red);
    box-shadow:13vw -72vh 0 -1.4vw rgba(var(--brand-red-rgb),.9),73vw -6vh 0 -1vw rgba(var(--brand-red-rgb),.85),82vw -78vh 0 -1.1vw rgba(var(--brand-red-rgb),.9);
    opacity:.18;
  }
  .slide > *{position:relative;z-index:1}

  .slide.dark{
    color:#fff;
    background:
      linear-gradient(135deg,var(--brand-red-dark),var(--brand-red) 54%,#e34034),
      radial-gradient(circle at 82% 18%,rgba(255,255,255,.22),transparent 22vw);
  }
  .slide.dark::before{
    background:rgba(255,255,255,.14);
    box-shadow:inset -10px -10px 18px rgba(255,255,255,.18),inset 10px 10px 26px rgba(0,0,0,.14);
    opacity:.55;
  }
  .slide.dark::after{background:#fff;box-shadow:14vw -66vh 0 -1.5vw rgba(255,255,255,.72),72vw -7vh 0 -1vw rgba(255,255,255,.58);opacity:.24}

  .brand-lockup{
    position:absolute;
    right:6.4vw;
    top:4.6vh;
    display:flex;
    align-items:center;
    gap:.58vw;
    color:var(--brand-black);
    font-weight:800;
    letter-spacing:.01em;
    font-size:1.08vw;
    z-index:3;
  }
  .dark .brand-lockup{color:#fff}
  .brand-mark{
    width:1.62vw;
    height:1.62vw;
    flex:none;
    color:var(--brand-red);
    background:currentColor;
    -webkit-mask:url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTMuNjcgNi4xNFMxLjgyIDcuOTEgMS43MiA5Ljc4di4zNWMuMDggMS41MSAxLjIyIDIuNCAxLjIyIDIuNCAxLjgzIDEuNzkgNi4yNiA0LjA0IDcuMyA0LjU1IDAgMCAuMDYuMDMuMS0uMDFsLjAyLS4wNHYtLjA0QzcuNTIgMTAuOCAzLjY3IDYuMTQgMy42NyA2LjE0ek05LjY1IDE4LjZjLS4wMi0uMDgtLjEtLjA4LS4xLS4wOGwtNy4zOC4yNmMuOCAxLjQzIDIuMTUgMi41MyAzLjU2IDIuMi45Ni0uMjUgMy4xNi0xLjc4IDMuODgtMi4zLjA2LS4wNS4wNC0uMDkuMDQtLjA5em0uMDgtLjc4QzYuNDkgMTUuNjMuMjEgMTIuMjguMjEgMTIuMjhjLS4xNS40Ni0uMi45LS4yMSAxLjN2LjA3YzAgMS4wNy40IDEuODIuNCAxLjgyLjggMS42OSAyLjM0IDIuMiAyLjM0IDIuMi43LjMgMS40LjMxIDEuNC4zMS4xMi4wMiA0LjQgMCA1LjU0IDAgLjA1IDAgLjA4LS4wNS4wOC0uMDV2LS4wNmMwLS4wMy0uMDMtLjA1LS4wMy0uMDV6TTkuMDYgMy4xOWEzLjQyIDMuNDIgMCAwMC0yLjU3IDMuMTV2LjQxYy4wMy42LjE2IDEuMDUuMTYgMS4wNS42NiAyLjkgMy44NiA3LjY1IDQuNTUgOC42NS4wNS4wNS4xLjAzLjEuMDNhLjEuMSAwIDAwLjA2LS4xYzEuMDYtMTAuNi0xLjExLTEzLjQyLTEuMTEtMTMuNDItLjMyLjAyLTEuMTkuMjMtMS4xOS4yM3ptOC4yOTkgMi4yN3MtLjQ5LTEuOC0yLjQ0LTIuMjhjMCAwLS41Ny0uMTQtMS4xNy0uMjIgMCAwLTIuMTggMi44MS0xLjEyIDEzLjQzLjAxLjA3LjA2LjA4LjA2LjA4LjA3LjAzLjEtLjAzLjEtLjAzLjcyLTEuMDMgMy45LTUuNzYgNC41NS04LjY0IDAgMCAuMzYtMS40LjAyLTIuMzR6bS0yLjkyIDEzLjA3cy0uMDcgMC0uMDkuMDVjMCAwLS4wMS4wNy4wMy4xLjcuNTEgMi44NSAyIDMuODggMi4zIDAgMCAuMTYuMDUuNDMuMDZoLjE0Yy42OS0uMDIgMS45LS4zNyAzLTIuMjZsLTcuNC0uMjV6bTcuODMtOC40MWMuMTQtMi4wNi0xLjk0LTMuOTctMS45NC0zLjk4IDAgMC0zLjg1IDQuNjYtNi42NyAxMC44IDAgMC0uMDMuMDguMDIuMTNsLjA0LjAxaC4wNmMxLjA2LS41MyA1LjQ2LTIuNzcgNy4yOC00LjU0IDAgMCAxLjE1LS45MyAxLjIxLTIuNDJ6bTEuNTIgMi4xNHMtNi4yOCAzLjM3LTkuNTIgNS41NWMwIDAtLjA1LjA0LS4wMy4xMSAwIDAgLjAzLjA2LjA3LjA2IDEuMTYgMCA1LjU2IDAgNS42Ny0uMDIgMCAwIC41Ny0uMDIgMS4yNy0uMjkgMCAwIDEuNTYtLjUgMi4zNy0yLjI3IDAgMCAuNzMtMS40NS4xNy0zLjE0eiIvPjwvc3ZnPg==") center/contain no-repeat;
    mask:url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjQgMjQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTMuNjcgNi4xNFMxLjgyIDcuOTEgMS43MiA5Ljc4di4zNWMuMDggMS41MSAxLjIyIDIuNCAxLjIyIDIuNCAxLjgzIDEuNzkgNi4yNiA0LjA0IDcuMyA0LjU1IDAgMCAuMDYuMDMuMS0uMDFsLjAyLS4wNHYtLjA0QzcuNTIgMTAuOCAzLjY3IDYuMTQgMy42NyA2LjE0ek05LjY1IDE4LjZjLS4wMi0uMDgtLjEtLjA4LS4xLS4wOGwtNy4zOC4yNmMuOCAxLjQzIDIuMTUgMi41MyAzLjU2IDIuMi45Ni0uMjUgMy4xNi0xLjc4IDMuODgtMi4zLjA2LS4wNS4wNC0uMDkuMDQtLjA5em0uMDgtLjc4QzYuNDkgMTUuNjMuMjEgMTIuMjguMjEgMTIuMjhjLS4xNS40Ni0uMi45LS4yMSAxLjN2LjA3YzAgMS4wNy40IDEuODIuNCAxLjgyLjggMS42OSAyLjM0IDIuMiAyLjM0IDIuMi43LjMgMS40LjMxIDEuNC4zMS4xMi4wMiA0LjQgMCA1LjU0IDAgLjA1IDAgLjA4LS4wNS4wOC0uMDV2LS4wNmMwLS4wMy0uMDMtLjA1LS4wMy0uMDV6TTkuMDYgMy4xOWEzLjQyIDMuNDIgMCAwMC0yLjU3IDMuMTV2LjQxYy4wMy42LjE2IDEuMDUuMTYgMS4wNS42NiAyLjkgMy44NiA3LjY1IDQuNTUgOC42NS4wNS4wNS4xLjAzLjEuMDNhLjEuMSAwIDAwLjA2LS4xYzEuMDYtMTAuNi0xLjExLTEzLjQyLTEuMTEtMTMuNDItLjMyLjAyLTEuMTkuMjMtMS4xOS4yM3ptOC4yOTkgMi4yN3MtLjQ5LTEuOC0yLjQ0LTIuMjhjMCAwLS41Ny0uMTQtMS4xNy0uMjIgMCAwLTIuMTggMi44MS0xLjEyIDEzLjQzLjAxLjA3LjA2LjA4LjA2LjA4LjA3LjAzLjEtLjAzLjEtLjAzLjcyLTEuMDMgMy45LTUuNzYgNC41NS04LjY0IDAgMCAuMzYtMS40LjAyLTIuMzR6bS0yLjkyIDEzLjA3cy0uMDcgMC0uMDkuMDVjMCAwLS4wMS4wNy4wMy4xLjcuNTEgMi44NSAyIDMuODggMi4zIDAgMCAuMTYuMDUuNDMuMDZoLjE0Yy42OS0uMDIgMS45LS4zNyAzLTIuMjZsLTcuNC0uMjV6bTcuODMtOC40MWMuMTQtMi4wNi0xLjk0LTMuOTctMS45NC0zLjk4IDAgMC0zLjg1IDQuNjYtNi42NyAxMC44IDAgMC0uMDMuMDguMDIuMTNsLjA0LjAxaC4wNmMxLjA2LS41MyA1LjQ2LTIuNzcgNy4yOC00LjU0IDAgMCAxLjE1LS45MyAxLjIxLTIuNDJ6bTEuNTIgMi4xNHMtNi4yOCAzLjM3LTkuNTIgNS41NWMwIDAtLjA1LjA0LS4wMy4xMSAwIDAgLjAzLjA2LjA3LjA2IDEuMTYgMCA1LjU2IDAgNS42Ny0uMDIgMCAwIC41Ny0uMDIgMS4yNy0uMjkgMCAwIDEuNTYtLjUgMi4zNy0yLjI3IDAgMCAuNzMtMS40NS4xNy0zLjE0eiIvPjwvc3ZnPg==") center/contain no-repeat;
  }
  .dark .brand-mark{color:#fff}

  .chrome{
    position:absolute;
    left:6.4vw;
    right:6.4vw;
    top:4.6vh;
    min-height:3.2vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    padding-bottom:1.1vh;
    color:var(--muted);
    font-size:.78vw;
    letter-spacing:.02em;
    z-index:2;
  }
  .dark .chrome{border-color:rgba(255,255,255,.28);color:rgba(255,255,255,.78)}
  .chrome .l{
    display:flex;
    align-items:center;
    gap:.72vw;
    font-weight:600;
    color:var(--ink);
  }
  .dark .chrome .l{color:#fff}
  .chrome .square{
    width:.9vw;
    height:.9vw;
    background:var(--brand-red);
    box-shadow:-.38vw -.38vw 0 0 rgba(var(--brand-red-rgb),.16);
    flex:none;
  }
  .dark .chrome .square{background:#fff;box-shadow:-.38vw -.38vw 0 0 rgba(255,255,255,.22)}

  .kicker{
    font-family:var(--mono);
    font-size:.78vw;
    line-height:1;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--brand-red);
    font-weight:600;
  }
  .dark .kicker{color:rgba(255,255,255,.82)}
  .h-hero{
    font-family:var(--sans-zh);
    font-size:min(5.8vw,10.3vh);
    line-height:1.02;
    letter-spacing:0;
    font-weight:900;
  }
  .h-xl{
    font-family:var(--sans-zh);
    font-size:min(4vw,7.4vh);
    line-height:1.08;
    font-weight:800;
    letter-spacing:0;
  }
  .h-md{
    font-family:var(--sans-zh);
    font-size:min(2.1vw,4.1vh);
    line-height:1.2;
    font-weight:800;
  }
  .lead{
    font-size:1.25vw;
    line-height:1.72;
    color:var(--muted);
    font-weight:400;
  }
  .dark .lead{color:rgba(255,255,255,.84)}
  .body-copy{
    font-size:1vw;
    line-height:1.82;
    color:#444b55;
  }
  .dark .body-copy{color:rgba(255,255,255,.78)}
  .meta{
    font-family:var(--mono);
    font-size:.76vw;
    color:var(--muted);
    letter-spacing:.04em;
  }

  .red-rule{height:.52vh;background:var(--brand-red);width:100%}
  .hairline{height:1px;background:var(--line);width:100%}
  .dark .hairline{background:rgba(255,255,255,.22)}

  .red-panel{
    background:linear-gradient(90deg,var(--brand-red),#ef4a3d);
    color:#fff;
    padding:4.2vh 3.4vw;
    min-height:32vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    box-shadow:var(--shadow-soft);
  }
  .red-panel .en{
    font-family:var(--mono);
    border:1px solid rgba(255,255,255,.42);
    color:rgba(255,255,255,.9);
    padding:.5vh .72vw;
    width:max-content;
    font-size:.86vw;
    letter-spacing:.08em;
  }

  .cover-shell{
    height:100%;
    display:grid;
    grid-template-columns:1.05fr .95fr;
    align-items:center;
    gap:5vw;
  }
  .cover-badge{
    width:10.4vw;
    height:10.4vw;
    border-radius:999px;
    background:linear-gradient(145deg,#fff,#e9edf2);
    box-shadow:inset -16px -16px 28px rgba(255,255,255,.95),inset 12px 12px 24px rgba(111,118,128,.14),0 22px 46px rgba(15,23,42,.14);
    display:grid;
    place-items:center;
    margin-bottom:3.4vh;
  }
  .cover-badge .brand-mark{
    width:5.8vw;
    height:5.8vw;
    color:var(--brand-red);
  }
  .cover-title-wrap{display:flex;flex-direction:column;gap:2.6vh}
  .cover-subtitle{max-width:46ch}
  .cover-wave{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:19vh;
    background:
      linear-gradient(8deg,var(--brand-red) 0 45%,transparent 46%),
      linear-gradient(6deg,rgba(17,17,17,.14) 0 51%,transparent 52%);
    opacity:.96;
  }
  .cover-meta{
    position:absolute;
    left:7vw;
    bottom:5vh;
    color:#fff;
    display:grid;
    gap:.86vh;
    font-size:.88vw;
    z-index:2;
  }
  .cover-visual{
    min-height:48vh;
    position:relative;
  }
  .orb{
    position:absolute;
    border-radius:50%;
    background:linear-gradient(145deg,#fff,#e6eaef);
    box-shadow:inset -10px -10px 20px rgba(255,255,255,.95),inset 8px 8px 20px rgba(111,118,128,.18),0 16px 28px rgba(15,23,42,.10);
  }
  .orb.red{background:linear-gradient(145deg,#f83230,var(--brand-red));box-shadow:0 12px 24px rgba(var(--brand-red-rgb),.26)}

  .agenda-layout{
    height:100%;
    display:grid;
    grid-template-columns:.72fr 1.28fr;
    gap:5vw;
    align-items:center;
  }
  .agenda-list{display:flex;flex-direction:column;gap:1.25vh}
  .agenda-item{
    display:grid;
    grid-template-columns:3.6vw 1fr;
    align-items:center;
    min-height:6.2vh;
    background:#e6e9ed;
    color:#505965;
  }
  .agenda-item .idx{
    height:100%;
    display:grid;
    place-items:center;
    background:var(--brand-red);
    color:#fff;
    font-family:var(--mono);
    font-weight:700;
  }
  .agenda-item .txt{padding:0 1.25vw;font-size:1.02vw;font-weight:700}

  .section-layout{
    height:100%;
    display:grid;
    grid-template-columns:.82fr 1.18fr;
    gap:4.5vw;
    align-items:center;
  }
  .section-no{
    width:8vw;
    height:8vw;
    border-radius:999px;
    background:#fff;
    box-shadow:var(--shadow);
    display:grid;
    place-items:center;
    color:var(--brand-red);
    font-family:var(--mono);
    font-size:2.2vw;
    font-weight:800;
    margin-bottom:2.6vh;
  }

  .grid-2,.grid-3,.grid-4{align-items:stretch}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:3vw}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:2vw}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.4vw}
  .grid-12{display:grid;grid-template-columns:repeat(12,1fr);gap:1vw}
  .span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}

  .content-stack{display:flex;flex-direction:column;gap:2.2vh}
  .same-size,
  .equal-children{
    align-items:stretch;
  }
  .same-size > *{
    height:100%;
    min-height:0;
  }
  .equal-children > *{
    height:100%;
    min-height:0;
  }
  .equal-children{
    display:grid;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    box-shadow:var(--shadow-soft);
    padding:3vh 2vw;
  }
  .grid-2 > .card,.grid-3 > .card,.grid-4 > .card{
    height:100%;
    display:flex;
    flex-direction:column;
  }
  .grid-2 > .image-frame,.grid-3 > .image-frame,.grid-4 > .image-frame{height:100%}
  .card.flat{box-shadow:none;background:#fff}
  .mini-card{
    min-height:0;
    border:1px solid var(--line);
    background:#fff;
    padding:1.25vh 1vw;
    display:grid;
    grid-template-rows:auto 1fr;
    gap:.45vh;
  }
  .mini-card strong{
    color:var(--ink);
    font-size:clamp(.84rem,.96vw,1.08rem);
    line-height:1.22;
    font-weight:800;
  }
  .mini-card .card-body{
    font-size:clamp(.76rem,.84vw,.98rem);
    line-height:1.34;
  }
  .card strong{
    display:inline-block;
    color:var(--ink);
    font-weight:800;
  }
  .card-title{
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-size:clamp(1.08rem,1.34vw,1.56rem);
    line-height:1.18;
    font-weight:800;
    color:var(--ink);
    margin-bottom:1.1vh;
  }
  .card-body{font-size:clamp(.92rem,1.02vw,1.18rem);line-height:1.58;color:var(--muted)}
  .num-pill{
    display:inline-grid;
    place-items:center;
    min-width:2.4vw;
    height:2.4vw;
    border-radius:999px;
    background:var(--brand-red);
    color:#fff;
    font-family:var(--mono);
    font-weight:800;
    margin-bottom:1.4vh;
  }
  .icon-disc{
    width:4.4vw;
    height:4.4vw;
    border-radius:999px;
    background:var(--brand-red);
    color:#fff;
    display:grid;
    place-items:center;
    margin-bottom:1.5vh;
    box-shadow:0 14px 28px rgba(var(--brand-red-rgb),.22);
  }
  .icon-disc .lucide{width:2vw;height:2vw;stroke-width:1.8}

  .timeline-v{display:grid;grid-template-columns:1fr 3vw 1fr;gap:2vw;align-items:start}
  .tl-axis{position:relative;min-height:58vh}
  .tl-axis::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line-strong)}
  .tl-dot{
    width:2.6vw;
    height:2.6vw;
    border-radius:999px;
    background:var(--brand-red);
    color:#fff;
    display:grid;
    place-items:center;
    font-family:var(--mono);
    font-weight:800;
    margin:0 auto 6.5vh;
    position:relative;
    z-index:1;
  }
  .tl-card{min-height:10vh;border-top:3px solid var(--brand-red);padding-top:1.3vh;margin-bottom:5.4vh}
  .tl-card .year{font-family:var(--mono);color:var(--brand-red);font-weight:800;margin-bottom:.6vh}

  .bar-chart{display:flex;flex-direction:column;gap:1.35vh}
  .bar-row{display:grid;grid-template-columns:7vw 1fr 4vw;gap:1vw;align-items:center;font-size:.9vw;color:var(--muted)}
  .bar-track{height:2.2vh;background:#e7eaee;position:relative;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--brand-red-dark),var(--brand-red));width:var(--v,50%)}
  .bar-row strong{font-family:var(--mono);color:var(--ink)}
  .stat-big{font-family:var(--mono);font-size:min(5.2vw,9vh);line-height:1;color:var(--brand-red);font-weight:800}

  .process{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:0;
    align-items:stretch;
  }
  .process-step{
    position:relative;
    background:#fff;
    border:1px solid var(--line);
    padding:3vh 1.6vw;
    min-height:30vh;
  }
  .process-step:not(:last-child)::after{
    content:"";
    position:absolute;
    right:-1.2vw;
    top:50%;
    transform:translateY(-50%);
    width:0;
    height:0;
    border-top:1.5vw solid transparent;
    border-bottom:1.5vw solid transparent;
    border-left:1.2vw solid var(--brand-red);
    z-index:2;
  }

  .arrow-timeline{
    --axis-y:50%;
    --line-left:4%;
    --line-right:6.4%;
    --line-h:5.2vh;
    --head-right:1.5%;
    --head-w:5vw;
    --head-h:8vh;
    position:relative;
    margin-top:7vh;
    height:36vh;
  }
  .arrow-timeline-line{
    position:absolute;
    left:var(--line-left);
    right:var(--line-right);
    top:var(--axis-y);
    height:var(--line-h);
    background:var(--brand-red);
    transform:translateY(-50%);
  }
  .arrow-timeline-head{
    position:absolute;
    right:var(--head-right);
    top:var(--axis-y);
    width:var(--head-w);
    height:var(--head-h);
    background:var(--brand-red);
    clip-path:polygon(0 0,100% 50%,0 100%);
    transform:translateY(-50%);
  }
  .arrow-timeline-node{
    position:absolute;
    top:var(--axis-y);
    width:1.8vw;
    height:1.8vw;
    border-radius:999px;
    background:var(--brand-red);
    box-shadow:0 0 0 .8vw rgba(var(--brand-red-rgb),.10);
    transform:translate(-50%,-50%);
    z-index:2;
  }
  .arrow-timeline-card{
    position:absolute;
    width:18vw;
    z-index:3;
  }
  .arrow-timeline-card.top{top:0}
  .arrow-timeline-card.bottom{bottom:0}

  .image-frame{
    background:#fff;
    border:1px solid var(--line);
    padding:.7vw;
    box-shadow:var(--shadow-soft);
  }
  .image-frame img{
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .r-16x9{aspect-ratio:16/9}
  .r-16x10{aspect-ratio:16/10}
  .r-4x3{aspect-ratio:4/3}
  .fit-contain img{object-fit:contain;background:#fff}
  .caption{
    margin-top:1vh;
    font-size:.76vw;
    color:var(--muted);
    line-height:1.5;
  }

  .quote-band{
    background:linear-gradient(90deg,var(--brand-red),var(--brand-red-dark));
    color:#fff;
    padding:3.4vh 3vw;
    font-family:var(--sans-zh);
    font-size:2.4vw;
    line-height:1.24;
    font-weight:900;
  }
  .bullet-list{
    display:grid;
    gap:1.15vh;
  }
  .bullet-item{
    display:grid;
    grid-template-columns:1.1vw 1fr;
    gap:1vw;
    align-items:start;
  }
  .bullet-dot{
    width:.72vw;
    height:.72vw;
    border-radius:50%;
    background:var(--brand-red);
    margin-top:.5vh;
  }

  [data-anim]{
    opacity:0;
    transform:translateY(16px);
    transition:opacity .56s ease,transform .56s cubic-bezier(.22,1,.36,1);
  }
  .slide.active [data-anim]{opacity:1;transform:none}
  .slide.active [data-anim]:nth-child(2){transition-delay:.06s}
  .slide.active [data-anim]:nth-child(3){transition-delay:.12s}
  .slide.active [data-anim]:nth-child(4){transition-delay:.18s}
  body.low-power [data-anim],#overview [data-anim]{opacity:1!important;transform:none!important}

  #hint{
    position:fixed;
    right:1.5vw;
    bottom:1.8vh;
    z-index:20;
    color:rgba(34,37,43,.56);
    font-size:.72vw;
    font-family:var(--mono);
    letter-spacing:.02em;
    user-select:none;
  }
  body.low-power #hint{color:var(--brand-red)}
  .page-no{
    position:absolute;
    left:2.2vw;
    bottom:2.2vh;
    z-index:4;
    font-family:var(--mono);
    font-size:.86vw;
    line-height:1;
    letter-spacing:.08em;
    color:rgba(34,37,43,.42);
    pointer-events:none;
  }
  .dark .page-no{color:rgba(255,255,255,.72)}
  .hw-cover .page-no{color:rgba(255,255,255,.74)}
  #nav{
    position:fixed;
    left:50%;
    bottom:2.1vh;
    transform:translateX(-50%);
    display:flex;
    gap:.55vw;
    z-index:20;
  }
  #nav button{
    width:.55vw;
    height:.55vw;
    border:0;
    border-radius:50%;
    background:rgba(34,37,43,.2);
    cursor:pointer;
    padding:0;
  }
  #nav button.active{background:var(--brand-red);transform:scale(1.35)}
  #overview{
    position:fixed;
    inset:0;
    background:rgba(10,10,10,.88);
    z-index:30;
    display:none;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
    padding:24px;
    overflow:auto;
  }
  body.overview #overview{display:grid}
  .thumb{
    position:relative;
    aspect-ratio:16/9;
    background:#fff;
    overflow:hidden;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.18);
  }
  .thumb .slide{
    transform:scale(.25);
    transform-origin:top left;
    pointer-events:none;
  }

  @media (max-width:900px){
    .slide{padding:8vh 6vw 8vh}
    .cover-shell,.agenda-layout,.section-layout,.grid-2{grid-template-columns:1fr;gap:3vh}
    .grid-3,.grid-4,.process{grid-template-columns:1fr 1fr}
    .brand-lockup{font-size:2.8vw}
    .brand-mark{width:3.4vw;height:3.4vw}
    .h-hero{font-size:12vw}
    .h-xl{font-size:8.8vw}
    .lead{font-size:3.5vw}
    .card-title{font-size:3.6vw;white-space:normal}
    .body-copy,.card-body{font-size:2.8vw}
    .chrome{font-size:2.2vw}
    .page-no{font-size:2.2vw;left:3.5vw;bottom:2.8vh}
    #hint{font-size:2vw}
  }
</style>
</head>
<body>
<div id="hint">← → 翻页 · B 静态 · ESC 索引</div>

<div id="deck">
<!-- ============================================================
     SLIDES 插入区 · 在此处填充所有 <section class="slide ..."> 页面
     页面骨架参考 references/layouts-huawei.md
     主题色配置参考 references/themes-huawei.md
     ============================================================ -->

<!-- SLIDES_HERE -->

</div>

<div id="nav"></div>
<div id="overview"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
(() => {
  const deck = document.getElementById('deck');
  const nav = document.getElementById('nav');
  const overview = document.getElementById('overview');
  const slides = [...document.querySelectorAll('.slide')];
  const lowPowerKey = 'guizang-huawei-low-power';
  let current = 0;
  let wheelLock = false;

  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  window.__lowPowerMode = localStorage.getItem(lowPowerKey) === '1' || prefersReduced;
  document.body.classList.toggle('low-power', window.__lowPowerMode);

  function buildPageNumbers(){
    const total = String(slides.length).padStart(2, '0');
    slides.forEach((slide, i) => {
      slide.querySelector('.page-no')?.remove();
      const pageNo = document.createElement('div');
      pageNo.className = 'page-no';
      pageNo.textContent = `${String(i + 1).padStart(2, '0')} / ${total}`;
      slide.appendChild(pageNo);
    });
  }

  function buildNav(){
    nav.innerHTML = '';
    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.type = 'button';
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.addEventListener('click', () => go(i));
      nav.appendChild(dot);
    });
  }

  function buildOverview(){
    overview.innerHTML = '';
    slides.forEach((slide, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      const clone = slide.cloneNode(true);
      clone.classList.add('active');
      thumb.appendChild(clone);
      thumb.addEventListener('click', () => {
        document.body.classList.remove('overview');
        go(i);
      });
      overview.appendChild(thumb);
    });
  }

  function updateTheme(){
    document.body.classList.toggle('dark-bg', slides[current]?.classList.contains('dark'));
  }

  function go(i){
    if (!slides.length) return;
    current = Math.max(0, Math.min(i, slides.length - 1));
    deck.style.transform = `translateX(${-current * 100}vw)`;
    slides.forEach((slide, idx) => slide.classList.toggle('active', idx === current));
    [...nav.children].forEach((dot, idx) => dot.classList.toggle('active', idx === current));
    updateTheme();
  }

  function toggleLowPower(){
    window.__lowPowerMode = !window.__lowPowerMode;
    localStorage.setItem(lowPowerKey, window.__lowPowerMode ? '1' : '0');
    document.body.classList.toggle('low-power', window.__lowPowerMode);
  }

  addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      event.preventDefault();
      document.body.classList.toggle('overview');
      return;
    }
    if (event.key === 'b' || event.key === 'B') {
      event.preventDefault();
      toggleLowPower();
      return;
    }
    if (document.body.classList.contains('overview')) return;
    if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') {
      event.preventDefault();
      go(current + 1);
    }
    if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
      event.preventDefault();
      go(current - 1);
    }
  });

  addEventListener('wheel', (event) => {
    if (document.body.classList.contains('overview') || wheelLock || Math.abs(event.deltaY) < 24) return;
    wheelLock = true;
    go(current + (event.deltaY > 0 ? 1 : -1));
    setTimeout(() => { wheelLock = false; }, 620);
  }, { passive: true });

  let touchStartX = null;
  addEventListener('touchstart', (event) => { touchStartX = event.touches[0]?.clientX ?? null; }, { passive: true });
  addEventListener('touchend', (event) => {
    if (touchStartX == null) return;
    const dx = (event.changedTouches[0]?.clientX ?? touchStartX) - touchStartX;
    if (Math.abs(dx) > 46) go(current + (dx < 0 ? 1 : -1));
    touchStartX = null;
  }, { passive: true });

  buildPageNumbers();
  buildNav();
  buildOverview();
  go(0);
  if (window.lucide) window.lucide.createIcons();
})();
</script>
</body>
</html>
